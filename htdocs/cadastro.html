<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - UFABC Study</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>📚 UFABC Study</header>

  <div class="login-container">
    <div class="login-header">
      <h1>Criar Conta</h1>
      <p>Junte-se para salvar suas anotações</p>
    </div>

    <form id="cadastroForm">
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group password-group">
        <div class="password-wrapper">
          <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
          <span style="font-size: 12px; color: rgb(117, 116, 116);" id="toggleSenha" class="toggle-icon">Mostrar Senha</span>
        </div>
      </div>

      <button type="submit" class="btn-submit">Cadastrar</button>
    </form>

    <div class="divider">
      <span>ou</span>
    </div>

    <div class="footer-text">
      <a href="/login.html">Já tem uma conta? Entre aqui</a>
    </div>

  </div>

  <script src="script_cadastro.js"></script>

</body>
</html>
